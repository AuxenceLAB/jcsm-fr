# JCSM Interne — Nginx config
# À ajouter dans /etc/nginx/sites-available/jcsm-interne

# Frontend static files
location /interne {
    alias /var/www/jcsm-interne/frontend;
    try_files $uri $uri/ /interne/index.html;
}

# Static assets
location /static {
    alias /var/www/jcsm-interne/frontend/static;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# Uploaded files
location /uploads {
    alias /var/www/jcsm-interne/uploads;
    expires 7d;
}

# API proxy
location /api {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 50M;
}
