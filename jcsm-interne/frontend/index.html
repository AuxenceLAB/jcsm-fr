<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCSM — Espace Interne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jcsm: {
                            primary: '#1B365D',
                            secondary: '#2D8CFF',
                            accent: '#00C853',
                            warning: '#FF9800',
                            danger: '#E53935',
                            bg: '#F5F7FA',
                            card: '#FFFFFF',
                            text: '#1A1A2E',
                            'text-light': '#6B7280',
                            border: '#E5E7EB',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .login-bg {
            background: linear-gradient(135deg, #1B365D 0%, #2D8CFF 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="login-bg flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-jcsm-primary rounded-xl mb-4">
                <span class="text-white text-2xl font-bold">J</span>
            </div>
            <h1 class="text-2xl font-bold text-jcsm-primary">JCSM</h1>
            <p class="text-jcsm-text-light text-sm mt-1">Espace interne</p>
        </div>

        <!-- Formulaire -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-jcsm-text mb-1">Mot de passe</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Entrez votre mot de passe"
                    class="w-full px-4 py-3 border border-jcsm-border rounded-lg focus:ring-2 focus:ring-jcsm-secondary focus:border-transparent outline-none transition"
                    autocomplete="current-password"
                    required
                >
            </div>

            <div id="error" class="hidden text-sm text-jcsm-danger bg-red-50 px-4 py-2 rounded-lg"></div>

            <button
                type="submit"
                id="submitBtn"
                class="w-full py-3 bg-jcsm-primary text-white font-semibold rounded-lg hover:bg-opacity-90 transition disabled:opacity-50"
            >
                Se connecter
            </button>
        </form>

        <p class="text-center text-xs text-jcsm-text-light mt-6">
            JCSM &mdash; Gestion des interventions IRVE
        </p>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('error');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ password: passwordInput.value }),
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'Erreur de connexion');
                }

                const data = await res.json();

                if (data.role === 'admin') {
                    window.location.href = '/interne/admin';
                } else {
                    window.location.href = '/interne/tech';
                }
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        });

        // Focus auto
        passwordInput.focus();
    </script>
</body>
</html>
