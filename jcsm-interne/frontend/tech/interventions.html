<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JCSM — Mes interventions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jcsm: {
                            primary: '#1B365D',
                            secondary: '#2D8CFF',
                            accent: '#00C853',
                            warning: '#FF9800',
                            danger: '#E53935',
                            bg: '#F5F7FA',
                            text: '#1A1A2E',
                            'text-light': '#6B7280',
                            border: '#E5E7EB',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-jcsm-bg min-h-screen pb-20">
    <!-- Header -->
    <header class="bg-white border-b border-jcsm-border sticky top-0 z-30">
        <div class="px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-jcsm-primary rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-sm">J</span>
                </div>
                <span class="text-sm">Bonjour <strong id="techName"></strong></span>
            </div>
            <button onclick="logout()" class="text-xs text-jcsm-text-light">Deconnexion</button>
        </div>
    </header>

    <!-- Content -->
    <main class="px-4 py-4">
        <h2 class="text-lg font-bold text-jcsm-primary mb-4">
            Mes interventions (<span id="count">0</span>)
        </h2>

        <div id="interventionsList" class="space-y-3"></div>

        <div id="emptyState" class="hidden text-center py-12 text-jcsm-text-light">
            <svg class="w-16 h-16 mx-auto mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            <p>Aucune intervention assignee</p>
        </div>
    </main>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
        <a href="/interne/tech" class="active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Interventions
        </a>
        <a href="#" id="navRapports">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Rapports
        </a>
        <a href="#" id="navProfil">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Profil
        </a>
    </nav>

    <script src="/static/js/app.js"></script>
    <script>
        let user = null;
        let interventions = [];

        const STATUT_ICONS = {
            a_planifier: { icon: '&#x1F534;', label: 'A PLANIFIER' },
            assignee: { icon: '&#x1F7E0;', label: 'ASSIGNEE' },
            notifiee: { icon: '&#x1F4E9;', label: 'NOTIFIEE' },
            en_route: { icon: '&#x1F535;', label: 'EN ROUTE' },
            sur_site: { icon: '&#x1F7E3;', label: 'SUR SITE' },
            terminee: { icon: '&#x1F7E2;', label: 'TERMINEE' },
            rapport_fait: { icon: '&#x1F4C4;', label: 'RAPPORT FAIT' },
            facturee: { icon: '&#x1F4B0;', label: 'FACTUREE' },
            payee: { icon: '&#x2705;', label: 'PAYEE' },
        };

        // Boutons d'action selon le statut
        function getActions(interv) {
            const s = interv.statut;
            const actions = [];

            // Lien Maps toujours present
            actions.push(`<a href="https://maps.google.com/?q=${encodeURIComponent(interv.adresse)}" target="_blank"
                class="flex-1 py-2 bg-jcsm-bg text-jcsm-text rounded-lg text-xs font-medium text-center">Maps</a>`);

            if (s === 'assignee') {
                actions.push(`<button onclick="changeStatut(${interv.id}, 'en_route')"
                    class="flex-1 py-2 bg-jcsm-secondary text-white rounded-lg text-xs font-medium">En route</button>`);
            } else if (s === 'en_route') {
                actions.push(`<button onclick="changeStatut(${interv.id}, 'sur_site')"
                    class="flex-1 py-2 bg-purple-600 text-white rounded-lg text-xs font-medium">Sur site</button>`);
            } else if (s === 'sur_site') {
                actions.push(`<button onclick="changeStatut(${interv.id}, 'terminee')"
                    class="flex-1 py-2 bg-jcsm-accent text-white rounded-lg text-xs font-medium">Termine</button>`);
            } else if (s === 'terminee') {
                actions.push(`<a href="/interne/tech/rapport/${interv.id}"
                    class="flex-1 py-2 bg-jcsm-primary text-white rounded-lg text-xs font-medium text-center">Rapport</a>`);
            }

            return actions.join('');
        }

        function renderInterventions() {
            const list = document.getElementById('interventionsList');
            const empty = document.getElementById('emptyState');
            document.getElementById('count').textContent = interventions.length;

            if (!interventions.length) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            list.innerHTML = interventions.map(i => {
                const s = STATUT_ICONS[i.statut] || { icon: '', label: i.statut };
                const dateStr = i.date_proposee ? formatDate(i.date_proposee) :
                                i.date_intervention ? formatDate(i.date_intervention) :
                                formatDate(i.date_demande);

                return `
                <div class="bg-white rounded-xl p-4 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <span class="badge badge-${i.statut}">${s.icon} ${s.label}</span>
                        <span class="text-xs text-jcsm-text-light font-mono">${i.numero_intervention || ''}</span>
                    </div>
                    <h3 class="font-semibold text-jcsm-text mb-1">${i.nom_site}</h3>
                    <div class="text-xs text-jcsm-text-light space-y-0.5 mb-3">
                        <div>&#x1F4CD; ${i.adresse}</div>
                        <div>&#x1F527; ${i.probleme}</div>
                        <div>&#x1F4C5; ${dateStr}</div>
                    </div>
                    <div class="flex gap-2">
                        ${getActions(i)}
                    </div>
                </div>`;
            }).join('');
        }

        async function changeStatut(id, newStatut) {
            try {
                await API.put(`/api/tech/interventions/${id}/statut`, { statut: newStatut });
                toast('Statut mis a jour');
                if (newStatut === 'terminee') {
                    window.location.href = `/interne/tech/rapport/${id}`;
                    return;
                }
                await loadData();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function loadData() {
            try {
                interventions = await API.get('/api/tech/mes-interventions');
                renderInterventions();
            } catch (e) { toast(e.message, 'error'); }
        }

        async function init() {
            user = await getCurrentUser();
            if (!user || user.role !== 'technicien') {
                window.location.href = '/interne';
                return;
            }
            document.getElementById('techName').textContent = user.prenom;
            await loadData();

            // Auto-refresh
            setInterval(loadData, 30000);
        }

        init();
    </script>
</body>
</html>
