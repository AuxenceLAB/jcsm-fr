<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JCSM — Rapport d'intervention</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jcsm: {
                            primary: '#1B365D',
                            secondary: '#2D8CFF',
                            accent: '#00C853',
                            warning: '#FF9800',
                            danger: '#E53935',
                            bg: '#F5F7FA',
                            text: '#1A1A2E',
                            'text-light': '#6B7280',
                            border: '#E5E7EB',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-jcsm-bg min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-jcsm-border sticky top-0 z-30">
        <div class="px-4 py-3 flex items-center gap-3">
            <a href="/interne/tech" class="text-jcsm-text-light hover:text-jcsm-text">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <span class="font-semibold text-jcsm-primary">Rapport d'intervention</span>
        </div>
    </header>

    <main class="px-4 py-4 max-w-lg mx-auto">
        <!-- Infos pre-remplies -->
        <div id="siteInfo" class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <h2 id="siteName" class="font-bold text-jcsm-primary text-lg"></h2>
            <p id="siteDetails" class="text-sm text-jcsm-text-light"></p>
        </div>

        <form id="rapportForm" class="space-y-4">
            <!-- Heures -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-jcsm-text mb-1">Heure debut</label>
                    <input type="time" id="heureDebut" class="w-full px-3 py-3 border border-jcsm-border rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-jcsm-text mb-1">Heure fin</label>
                    <input type="time" id="heureFin" class="w-full px-3 py-3 border border-jcsm-border rounded-lg text-sm">
                </div>
            </div>

            <!-- Reussi -->
            <div>
                <label class="block text-sm font-medium text-jcsm-text mb-2">Intervention reussie ?</label>
                <div class="flex gap-3">
                    <button type="button" id="btnOui" onclick="setReussi(true)"
                        class="flex-1 py-3 border-2 border-jcsm-border rounded-lg text-sm font-semibold transition hover:border-jcsm-accent">OUI</button>
                    <button type="button" id="btnNon" onclick="setReussi(false)"
                        class="flex-1 py-3 border-2 border-jcsm-border rounded-lg text-sm font-semibold transition hover:border-jcsm-danger">NON</button>
                </div>
            </div>

            <!-- Texte brut -->
            <div>
                <label class="block text-sm font-medium text-jcsm-text mb-1">Ce que j'ai fait :</label>
                <textarea id="texteBrut" rows="5" placeholder="Ecrivez librement, meme en style oral. L'IA reformulera."
                    class="w-full px-3 py-3 border border-jcsm-border rounded-lg text-sm resize-none"></textarea>
            </div>

            <!-- Bouton reformulation IA -->
            <button type="button" onclick="reformulerIA()" id="btnIA"
                class="w-full py-3 bg-purple-600 text-white rounded-lg text-sm font-semibold hover:bg-purple-700 transition flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Reformuler IA
            </button>

            <!-- Apercu refomule -->
            <div id="apercu" class="hidden bg-white rounded-xl p-4 shadow-sm border-l-4 border-purple-500">
                <h3 class="text-sm font-bold text-purple-700 mb-3">Apercu reformule</h3>
                <div class="space-y-3 text-sm">
                    <div>
                        <strong class="text-jcsm-text">Description :</strong>
                        <p id="previewDescription" class="text-jcsm-text-light mt-1" contenteditable="true"></p>
                    </div>
                    <div>
                        <strong class="text-jcsm-text">Commentaires :</strong>
                        <p id="previewCommentaires" class="text-jcsm-text-light mt-1" contenteditable="true"></p>
                    </div>
                    <div>
                        <strong class="text-jcsm-text">Prochaines etapes :</strong>
                        <p id="previewEtapes" class="text-jcsm-text-light mt-1" contenteditable="true"></p>
                    </div>
                    <div>
                        <strong class="text-jcsm-text">Risques :</strong>
                        <p id="previewRisques" class="text-jcsm-text-light mt-1" contenteditable="true"></p>
                    </div>
                </div>
            </div>

            <!-- Photos -->
            <div>
                <label class="block text-sm font-medium text-jcsm-text mb-2">Photos</label>
                <input type="file" id="photoInput" accept="image/*" multiple capture="environment" class="hidden">
                <button type="button" onclick="document.getElementById('photoInput').click()"
                    class="w-full py-3 border-2 border-dashed border-jcsm-border rounded-lg text-sm text-jcsm-text-light hover:border-jcsm-secondary transition">
                    + Ajouter des photos
                </button>
                <div id="photoPreview" class="flex flex-wrap gap-2 mt-2"></div>
            </div>

            <!-- Valider -->
            <button type="submit" id="btnValider"
                class="w-full py-4 bg-jcsm-accent text-white rounded-lg font-bold text-base hover:bg-opacity-90 transition">
                VALIDER LE RAPPORT
            </button>
        </form>
    </main>

    <script src="/static/js/app.js"></script>
    <script>
        let user = null;
        let intervention = null;
        let reussi = null;
        let uploadedPhotos = [];
        let reformulated = null;

        // Extraire l'ID de l'URL
        const pathParts = window.location.pathname.split('/');
        const interventionId = parseInt(pathParts[pathParts.length - 1]);

        function setReussi(val) {
            reussi = val;
            const btnOui = document.getElementById('btnOui');
            const btnNon = document.getElementById('btnNon');
            btnOui.className = val
                ? 'flex-1 py-3 border-2 border-jcsm-accent bg-green-50 rounded-lg text-sm font-semibold text-jcsm-accent'
                : 'flex-1 py-3 border-2 border-jcsm-border rounded-lg text-sm font-semibold transition hover:border-jcsm-accent';
            btnNon.className = !val
                ? 'flex-1 py-3 border-2 border-jcsm-danger bg-red-50 rounded-lg text-sm font-semibold text-jcsm-danger'
                : 'flex-1 py-3 border-2 border-jcsm-border rounded-lg text-sm font-semibold transition hover:border-jcsm-danger';
        }

        async function reformulerIA() {
            const texte = document.getElementById('texteBrut').value.trim();
            if (!texte) { toast('Ecrivez d\'abord ce que vous avez fait', 'error'); return; }

            const btn = document.getElementById('btnIA');
            btn.disabled = true;
            btn.innerHTML = '<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Reformulation en cours...';

            try {
                reformulated = await API.post('/api/rapports/reformuler', {
                    texte_brut: texte,
                    client: intervention.client || '',
                    nom_site: intervention.nom_site || '',
                    marque: intervention.marque || '',
                    charger_id: intervention.charger_id || '',
                    probleme: intervention.probleme || '',
                });

                document.getElementById('previewDescription').textContent = reformulated.description;
                document.getElementById('previewCommentaires').textContent = reformulated.commentaires;
                document.getElementById('previewEtapes').textContent = reformulated.prochaines_etapes;
                document.getElementById('previewRisques').textContent = reformulated.risques;
                document.getElementById('apercu').classList.remove('hidden');
                toast('Reformulation terminee');
            } catch (e) {
                toast(e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> Reformuler IA';
            }
        }

        // Photos
        document.getElementById('photoInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;

            try {
                const result = await API.uploadFiles('/api/rapports/upload-photos', files);
                uploadedPhotos.push(...result.photos);
                renderPhotos();
                toast(`${result.count} photo(s) ajoutee(s)`);
            } catch (err) {
                toast('Erreur upload photos', 'error');
            }
        });

        function renderPhotos() {
            const preview = document.getElementById('photoPreview');
            preview.innerHTML = uploadedPhotos.map((p, i) => `
                <div class="relative w-20 h-20 rounded-lg overflow-hidden bg-jcsm-bg">
                    <img src="${p.url}" class="w-full h-full object-cover" alt="Photo ${i+1}">
                    <button type="button" onclick="removePhoto(${i})"
                        class="absolute top-0 right-0 w-5 h-5 bg-jcsm-danger text-white text-xs rounded-bl-lg flex items-center justify-center">&times;</button>
                </div>
            `).join('');
        }

        function removePhoto(i) {
            uploadedPhotos.splice(i, 1);
            renderPhotos();
        }

        // Submit
        document.getElementById('rapportForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btnValider');
            btn.disabled = true;
            btn.textContent = 'Envoi en cours...';

            // Mettre a jour reussi sur l'intervention
            if (reussi !== null) {
                try {
                    await API.put(`/api/tech/interventions/${interventionId}/statut`, {
                        statut: 'terminee',
                        reussi: reussi,
                    });
                } catch (e) { /* Continue quand meme */ }
            }

            // Recuperer les textes reformules (editables) ou le brut
            const description = reformulated
                ? document.getElementById('previewDescription').textContent
                : document.getElementById('texteBrut').value;
            const commentaires = reformulated
                ? document.getElementById('previewCommentaires').textContent
                : '';
            const prochaines_etapes = reformulated
                ? document.getElementById('previewEtapes').textContent
                : '';
            const risques = reformulated
                ? document.getElementById('previewRisques').textContent
                : '';

            try {
                const rapport = await API.post('/api/rapports', {
                    intervention_id: interventionId,
                    technicien_id: user.technicien_id,
                    date_intervention: new Date().toISOString().split('T')[0],
                    heure_debut: document.getElementById('heureDebut').value || null,
                    heure_fin: document.getElementById('heureFin').value || null,
                    texte_brut_technicien: document.getElementById('texteBrut').value,
                    description: description,
                    commentaires: commentaires,
                    prochaines_etapes: prochaines_etapes,
                    risques: risques,
                    photos: uploadedPhotos,
                    source: 'web',
                });

                // Generer PDF
                try {
                    await API.post(`/api/rapports/${rapport.id}/generer-pdf`);
                } catch (e) { /* PDF generation optionnelle */ }

                toast('Rapport valide !');
                setTimeout(() => window.location.href = '/interne/tech', 1500);
            } catch (e) {
                toast(e.message, 'error');
                btn.disabled = false;
                btn.textContent = 'VALIDER LE RAPPORT';
            }
        });

        async function init() {
            user = await getCurrentUser();
            if (!user || user.role !== 'technicien') {
                window.location.href = '/interne';
                return;
            }

            try {
                intervention = await API.get(`/api/interventions/${interventionId}`);
                document.getElementById('siteName').textContent = intervention.nom_site;
                document.getElementById('siteDetails').textContent =
                    `${intervention.client || ''} ${intervention.numero_job ? '• ' + intervention.numero_job : ''}`;
            } catch (e) {
                toast('Intervention introuvable', 'error');
                setTimeout(() => window.location.href = '/interne/tech', 1500);
            }
        }

        init();
    </script>
</body>
</html>
