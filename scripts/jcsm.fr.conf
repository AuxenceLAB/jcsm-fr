server {
    listen 80;
    listen [::]:80;
    server_name jcsm.fr www.jcsm.fr;
    return 301 https://jcsm.fr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.jcsm.fr;
    
    # SSL config should be managed by Certbot/Let's Encrypt
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_certificate ...
    
    return 301 https://jcsm.fr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jcsm.fr;

    root /var/www/jcsm.fr;
    index index.html;

    # SSL Config (managed by Certbot)
    # ssl_certificate /etc/letsencrypt/live/jcsm.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/jcsm.fr/privkey.pem;

    # 1. CLEAN URLS (Very Important)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # 2. GZIP COMPRESSION
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # 3. SECURITY HEADERS
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # 4. CACHE CONTROL
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 404 Page
    error_page 404 /404.html;
}
