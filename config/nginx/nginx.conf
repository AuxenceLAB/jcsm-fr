user www-data;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    server_tokens off;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/cache-manifest
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/manifest+json
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2
        font/ttf
        application/vnd.ms-fontobject;

    # Brotli
    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/cache-manifest
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/manifest+json
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2
        font/ttf
        application/vnd.ms-fontobject;

    # Catch-all: reject unknown hosts (no stale proxy)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;
    }
}
