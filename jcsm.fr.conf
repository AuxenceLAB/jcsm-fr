# Redirection HTTP -> HTTPS pour jcsm.fr
server {
    listen 80;
    server_name jcsm.fr www.jcsm.fr;

    return 301 https://jcsm.fr$request_uri;
}

# Site jcsm.fr servi en HTTPS
server {
    listen 443 ssl http2;
    server_name jcsm.fr www.jcsm.fr;

    root /var/www/jcsm.fr;
    index index.html index.htm index.php;

    location / {
        try_files $uri $uri/ =404;
    }

    ssl_certificate /etc/letsencrypt/live/jcsm.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jcsm.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}