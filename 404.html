<!DOCTYPE html>
<html lang="fr">
<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable | JCSM</title>
    <meta name="robots" content="noindex, follow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <style>
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            box-sizing: border-box;
        }
        
        html, body { 
            overflow-x: hidden !important;
            max-width: 100vw;
            width: 100%;
            margin: 0;
            padding: 0;
            position: relative;
        }
        
        /* Empêcher tout débordement horizontal */
        main, section, article, header, footer, nav, div {
            max-width: 100%;
            box-sizing: border-box;
        }
        
        section {
            overflow-x: hidden;
            width: 100%;
        }
        
        /* S'assurer que tous les conteneurs sont centrés */
        .max-w-7xl, .max-w-6xl, .max-w-5xl, .max-w-4xl, .max-w-3xl, .max-w-2xl, .max-w-xl {
            margin-left: auto !important;
            margin-right: auto !important;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
            box-sizing: border-box;
            max-width: 100%;
        }
        
        img, video, iframe {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="min-h-screen bg-[#FAFAFA] text-gray-900 flex flex-col">
    <main class="flex-1 flex items-center justify-center px-6">
        <div class="max-w-xl w-full text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-black text-white mb-6">
                <span class="text-2xl font-semibold">404</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4">Page introuvable</h1>
            <p class="text-lg text-gray-600 mb-8">
                La page que vous recherchez n'existe plus ou a changé d'adresse. 
                Vous pouvez revenir à l'accueil ou découvrir nos services IRVE.
            </p>
            <div class="flex flex-wrap justify-center gap-4 mb-10">
                <a href="index.html" class="btn-primary px-6 py-3 rounded-xl font-medium text-sm sm:text-base">
                    Retour à l'accueil
                </a>
                <a href="pilotage-projets.html" class="btn-secondary px-6 py-3 rounded-xl font-medium text-sm sm:text-base border border-gray-300">
                    Découvrir nos services
                </a>
            </div>
            <p class="text-sm text-gray-500">
                Besoin d'aide ? <a href="mailto:contact@jcsm.fr" class="underline hover:text-gray-900">contact@jcsm.fr</a>
            </p>
        </div>
    </main>
    <script src="animations.js" defer></script>
</body>
</html>
