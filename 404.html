<!DOCTYPE html>
<html lang="fr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 - Page introuvable | JCSM</title>
    <meta name="robots" content="noindex, follow">
    <meta property="og:site_name" content="JCSM - Infrastructure de Recharge">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/config.js?v=26"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
        }

        @keyframes twinkle {

            0%,
            100% {
                transform: scale(1);
                opacity: var(--opacity);
            }

            50% {
                transform: scale(1.5);
                opacity: 1;
            }
        }

        /* Glitch Text */
        .glitch-text {
            font-size: 8rem;
            font-weight: 800;
            position: relative;
            text-shadow: 2px 2px #2563EB, -2px -2px #FF0080;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% {
                transform: translate(0)
            }

            2% {
                transform: translate(-2px, 2px)
            }

            4% {
                transform: translate(2px, -2px)
            }

            6% {
                transform: translate(0)
            }

            100% {
                transform: translate(0)
            }
        }

        /* Floating Astronaut/Element */
        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }
    </style>
</head>

<body class="h-full flex items-center justify-center relative">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-white focus:text-black focus:px-4 focus:py-2 focus:rounded-lg">Aller au contenu principal</a>

    <!-- Stars Background -->
    <div class="stars" id="stars"></div>

    <main id="main-content" class="relative z-10 text-center px-4">
        <div class="mb-8 floating">
            <span class="text-6xl" role="img" aria-label="Prise de recharge">🔌</span>
        </div>

        <h1 class="glitch-text mb-4 leading-none">404</h1>

        <h2
            class="text-2xl md:text-3xl font-bold mb-6 text-blue-500">
            Cette page s'est débranchée...
        </h2>

        <p class="text-gray-500 text-lg mb-10 max-w-md mx-auto">
            Pas de courant ici. La page que vous cherchez a été déplacée ou n'existe plus, mais notre réseau reste bien connecté.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="index.html"
                class="group relative px-8 py-4 bg-white text-black font-bold rounded-full overflow-hidden transition-transform hover:scale-105 active:scale-95">
                <span class="relative z-10 group-hover:text-blue-600 transition-colors">Revenir à l'accueil</span>
                <div
                    class="absolute inset-0 bg-blue-100 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left">
                </div>
            </a>

            <a href="contact.html"
                class="px-8 py-4 border border-white/20 rounded-full hover:bg-white/10 transition-colors backdrop-blur-sm">
                Nous contacter
            </a>
        </div>
    </main>

    <footer class="absolute bottom-4 left-0 right-0 text-center z-10" role="contentinfo" aria-label="Pied de page">
        <p class="text-xs text-gray-600">© 2026 JCSM SAS</p>
    </footer>

    <button class="scroll-top glow-border" id="scrollTop" aria-label="Retour en haut de la page">
        <svg class="w-6 h-6 float-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
        </svg>
    </button>

    <noscript><p style="text-align:center;color:#9ca3af;margin-top:2rem;">JavaScript est requis pour cette page.</p></noscript>
    <script>
        // Generate Stars (only once)
        const starsContainer = document.getElementById('stars');
        if (starsContainer && starsContainer.children.length === 0) {
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--opacity', Math.random() * 0.7 + 0.3);
                starsContainer.appendChild(star);
            }
        }
    </script>
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .catch(() => {});
            });
        }
    </script>
</body>

</html>
