<!DOCTYPE html>
<html lang="fr" class="h-full">

<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Perdu dans l'espace | JCSM</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
        }

        @keyframes twinkle {

            0%,
            100% {
                transform: scale(1);
                opacity: var(--opacity);
            }

            50% {
                transform: scale(1.5);
                opacity: 1;
            }
        }

        /* Glitch Text */
        .glitch-text {
            font-size: 8rem;
            font-weight: 900;
            position: relative;
            text-shadow: 2px 2px #0070F3, -2px -2px #FF0080;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% {
                transform: translate(0)
            }

            2% {
                transform: translate(-2px, 2px)
            }

            4% {
                transform: translate(2px, -2px)
            }

            6% {
                transform: translate(0)
            }

            100% {
                transform: translate(0)
            }
        }

        /* Floating Astronaut/Element */
        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }
    </style>
</head>

<body class="h-full flex items-center justify-center relative">

    <!-- Stars Background -->
    <div class="stars" id="stars"></div>

    <main class="relative z-10 text-center px-4">
        <div class="mb-8 floating">
            <span class="text-6xl">🚀</span>
        </div>

        <h1 class="glitch-text mb-4 leading-none">404</h1>

        <h2
            class="text-2xl md:text-3xl font-bold mb-6 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
            Houston, on a un problème...
        </h2>

        <p class="text-gray-400 text-lg mb-10 max-w-md mx-auto">
            La page que vous cherchez a peut-être été aspirée par un trou noir ou n'existe pas.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="index.html"
                class="group relative px-8 py-4 bg-white text-black font-bold rounded-full overflow-hidden transition-transform hover:scale-105 active:scale-95">
                <span class="relative z-10 group-hover:text-blue-600 transition-colors">Retour sur Terre</span>
                <div
                    class="absolute inset-0 bg-blue-100 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left">
                </div>
            </a>

            <a href="index.html#contact"
                class="px-8 py-4 border border-white/20 rounded-full hover:bg-white/10 transition-colors backdrop-blur-sm">
                Signaler une anomalie
            </a>
        </div>
    </main>

    <script>
        // Generate Stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.setProperty('--opacity', Math.random() * 0.7 + 0.3);
            starsContainer.appendChild(star);
        }
    </script>
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .catch((error) => console.log('SW registration failed'));
            });
        }
    </script>
</body>

</html>
